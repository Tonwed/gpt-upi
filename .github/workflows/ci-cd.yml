name: CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

env:
  DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/gpt_upi?schema=public
  JWT_SECRET: ci-only-jwt-secret-not-used-in-production
  SESSION_TOKEN_ENCRYPTION_KEY: ci-only-session-token-encryption-key
  NEXT_PUBLIC_TELEGRAM_BOT_USERNAME: your_bot_username

jobs:
  ci:
    name: Lint and build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.19.0'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run prisma:generate

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          SKIP_ENV_VALIDATION: '1'
